<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: Helvetica, Arial, sans-serif;
    font-weight: 700;
    font-size: 0.8125rem; /* 13px */
    line-height: 1.23;
    color: #000;
  }

  /* Nav bar outer */
  .nav {
    background: #fff;
    position: relative;
    padding-top: 8px;
    box-shadow: 0 0.0625rem 0 rgba(0,0,0,0.15);
  }
  .nav-wrap {
    margin: 0 auto;
    max-width: 80rem;
    padding: 0 16px;
  }
  .nav-content {
    display: flex;
    justify-content: space-between;
    position: relative;
    width: 100%;
  }

  /* Logo section */
  .nav-item {
    display: flex;
    margin-top: -4px;
    align-self: center;
  }
  .logo-link {
    display: block;
    height: 100%;
    line-height: calc(4rem - 8px);
    text-align: center;
    text-decoration: inherit;
    color: inherit;
  }
  .logo-icon {
    display: inline-flex;
    height: 2.0625rem;
    vertical-align: middle;
  }
  .logo-block {
    display: inline-block;
    width: 2.0625rem;
    height: 2.0625rem;
    background: #000;
    color: #fff;
    text-align: center;
    font-size: 1.2rem;
    line-height: 2.0625rem;
    margin: 0 1px;
  }

  /* Separator */
  .separator {
    border-left: 1px solid rgba(0,0,0,0.15);
    margin: 12px 0;
    align-self: stretch;
  }

  /* Nav links list */
  .nav-list {
    flex: auto;
    display: flex;
    gap: 0.375rem;
    justify-content: space-between;
    list-style: none;
    padding-left: 12px;
  }
  .nav-product {
    color: #000;
    text-align: center;
    height: 3.75rem;
  }
  .nav-link {
    display: block;
    height: 100%;
    line-height: calc(4rem - 8px);
    text-decoration: inherit;
    color: inherit;
    white-space: nowrap;
    text-align: center;
    min-width: 1.5rem;
  }
  .nav-hover {
    position: relative;
    text-decoration: none;
    display: inline-block;
  }

  /* Nav icon wrapper */
  .icon-wrapper {
    display: inline-block;
    height: 1.125rem;
    width: 1.125rem;
    vertical-align: middle;
    padding: 4px;
    margin-bottom: 4px;
  }
  .icon-wrapper > svg {
    display: block;
    width: 100%;
    height: 100%;
    fill: currentcolor;
  }

  /* Dots menu icon */
  .dots-wrapper {
    display: inline-block;
    width: 1.25rem;
    height: 0.25rem;
  }
  .dots-wrapper > svg {
    vertical-align: 0.1875rem;
  }
  .dots-hover {
    width: 2rem;
    position: relative;
    text-decoration: none;
    display: inline-block;
  }

  /* Burger icon */
  .burger-item {
    display: flex;
    margin-top: -4px;
    align-self: center;
    width: 2.5rem;
  }
  .burger-link {
    display: block;
    height: 100%;
    line-height: calc(4rem - 8px);
    text-decoration: inherit;
    color: inherit;
    text-align: center;
    min-width: 1.5rem;
  }
  .burger-icon {
    display: inline-flex;
    width: 1.5rem;
    height: 1.375rem;
    vertical-align: -0.5em;
    justify-content: space-evenly;
  }

  /* Search */
  .search-item {
    display: flex;
    align-self: center;
    width: auto;
  }
  .search-link {
    display: block;
    height: 100%;
    line-height: calc(4rem - 8px);
    text-decoration: inherit;
    color: inherit;
    text-align: center;
    padding: 0 0.625rem;
  }
  .search-icon {
    display: inline-block;
    height: 1.8125rem;
    width: 1.75rem;
    vertical-align: middle;
  }
  .search-icon > svg {
    display: block;
    width: 100%;
    height: 100%;
    fill: currentcolor;
  }

  /* Last group container */
  .last-group {
    display: flex;
    padding-left: 0;
  }

  /* Reference colors for icons */
  .red { color: #EB0000; }
  .yellow { color: #FFBA00; }
  .blue { color: #149EDC; }
  .pink { color: #FF4C98; }
  .orange { color: #FA6400; }
</style>
</head>
<body>

<h3 style="padding: 8px 16px; font-size: 14px;">Simplified BBC Nav Test</h3>

<nav class="nav">
  <div class="nav-wrap">
    <div class="nav-content">

      <!-- BBC Logo -->
      <div class="nav-item">
        <a class="logo-link">
          <span class="logo-icon">
            <span class="logo-block">B</span>
            <span class="logo-block">B</span>
            <span class="logo-block">C</span>
          </span>
        </a>
      </div>

      <!-- Separator -->
      <div class="separator"></div>

      <!-- Nav links -->
      <ul class="nav-list">
        <li class="nav-product">
          <a class="nav-link">
            <span class="nav-hover">Home</span>
          </a>
        </li>
        <li class="nav-product">
          <a class="nav-link">
            <span class="nav-hover red">
              <span class="icon-wrapper">
                <svg viewBox="0 0 16 16"><rect width="16" height="16" fill="currentColor"/></svg>
              </span>
              News
            </span>
          </a>
        </li>
        <li class="nav-product">
          <a class="nav-link">
            <span class="nav-hover yellow">
              <span class="icon-wrapper">
                <svg viewBox="0 0 16 16"><rect width="16" height="16" fill="currentColor"/></svg>
              </span>
              Sport
            </span>
          </a>
        </li>
        <li class="nav-product">
          <a class="nav-link">
            <span class="nav-hover blue">
              <span class="icon-wrapper">
                <svg viewBox="0 0 16 16"><rect width="16" height="16" fill="currentColor"/></svg>
              </span>
              Weather
            </span>
          </a>
        </li>
        <li class="nav-product">
          <a class="nav-link">
            <span class="nav-hover pink">
              <span class="icon-wrapper">
                <svg viewBox="0 0 16 16"><rect width="16" height="16" fill="currentColor"/></svg>
              </span>
              iPlayer
            </span>
          </a>
        </li>
        <li class="nav-product">
          <a class="nav-link">
            <span class="nav-hover orange">
              <span class="icon-wrapper">
                <svg viewBox="0 0 16 16"><rect width="16" height="16" fill="currentColor"/></svg>
              </span>
              Sounds
            </span>
          </a>
        </li>

        <!-- Dots/More menu -->
        <li class="nav-product">
          <a class="nav-link">
            <span class="dots-hover">
              <span class="dots-wrapper">
                <svg width="20" height="4" viewBox="0 0 20 4" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
                  <g transform="translate(-14.000000, -22.000000)">
                    <path d="M18,22 L18,26 L14,26 L14,22 L18,22 Z M34,22 L34,26 L30,26 L30,22 L34,22 Z M26,22 L26,26 L22,26 L22,22 L26,22 Z"></path>
                  </g>
                </svg>
              </span>
            </span>
          </a>
        </li>
      </ul>

      <!-- Last group: burger + search -->
      <div class="last-group">
        <!-- Burger -->
        <div class="burger-item">
          <a class="burger-link">
            <span class="burger-icon">
              <svg width="1.5em" height="1.375em" viewBox="0 0 24 22" fill="currentColor">
                <path d="M24,18 L24,22 L0,22 L0,18 L24,18 Z M24,9 L24,13 L0,13 L0,9 L24,9 Z M24,0 L24,4 L0,4 L0,0 L24,0 Z"></path>
              </svg>
            </span>
          </a>
        </div>

        <!-- Search -->
        <div class="search-item">
          <a class="search-link">
            <span class="search-icon">
              <svg viewBox="0 0 32 32">
                <path d="m30.6 28.1-8.3-8.3c1.5-2 2.4-4.4 2.4-7.2C24.7 6 19.6 1 13 1S1.4 6.1 1.4 12.7 6.5 24.3 13 24.3c2.3 0 4.4-.6 6.2-1.8l8.5 8.5zM4 12.6c0-5.2 3.9-9.1 9-9.1s9 3.9 9 9.1-3.9 9.1-9 9.1-9-3.9-9-9.1"></path>
              </svg>
            </span>
          </a>
        </div>
      </div>

    </div>
  </div>
</nav>

</body>
</html>
