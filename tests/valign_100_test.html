<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: Helvetica, Arial, sans-serif; font-size: 16px; margin: 20px; }
</style>
</head>
<body>

<!-- vertical-align: 100% with line-height: 40px => 40px shift up -->
<div style="background: #f0f0f0; padding: 8px; border: 1px solid #ccc; line-height: 40px;">
  <span style="background: lightyellow;">Baseline</span>
  <span style="vertical-align: 100%; background: lightcoral;">100%</span>
  <span style="vertical-align: 40px; background: lightgreen;">40px</span>
</div>

</body>
</html>
