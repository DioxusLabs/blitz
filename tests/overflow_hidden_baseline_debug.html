<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: Helvetica, Arial, sans-serif; font-size: 16px; margin: 20px; }
</style>
</head>
<body>

<div style="background: #f0f0f0; border: 1px solid #ccc; padding: 8px;">
<span style="background: lightyellow;">Align</span>
<span style="display: inline-block; width: 120px; background: lightcoral; padding: 8px; overflow: visible;">
  Visible text
</span>
<span style="display: inline-block; width: 120px; background: lightblue; padding: 8px; overflow: hidden;">
  Hidden text
</span>
<span style="background: lightyellow;">After</span>
</div>

</body>
</html>
