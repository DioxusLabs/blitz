<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: Helvetica, Arial, sans-serif; font-size: 13px; line-height: 1.23; }
</style>
</head>
<body>

<!-- Test 1: Text-only baseline (reference) -->
<div style="background: #eee; margin: 10px;">
  <span style="background: lightblue;">Hello text</span>
</div>

<!-- Test 2: Inline box only (strut should give this line height from parent font) -->
<div style="background: #eee; margin: 10px;">
  <span style="display: inline-block; width: 20px; height: 4px; background: red; vertical-align: middle;"></span>
</div>

<!-- Test 3: Text + inline box (dots beside text, should align middle) -->
<div style="background: #eee; margin: 10px;">
  <span style="background: lightblue;">Text</span>
  <span style="display: inline-block; width: 20px; height: 4px; background: red; vertical-align: middle;"></span>
</div>

<!-- Test 4: line-height: 56px with only an inline box (simulates nav link) -->
<div style="background: #eee; margin: 10px; line-height: 56px;">
  <span style="display: inline-block; width: 20px; height: 4px; background: red; vertical-align: middle;"></span>
</div>

<!-- Test 5: line-height: 56px with text + inline box -->
<div style="background: #eee; margin: 10px; line-height: 56px;">
  <span style="background: lightblue;">Text</span>
  <span style="display: inline-block; width: 20px; height: 4px; background: red; vertical-align: middle;"></span>
</div>

<!-- Test 6: Nested like BBC dots - a > span > span (inline-block) -->
<div style="background: #eee; margin: 10px; font-weight: 700; font-size: 13px; line-height: 56px;">
  <a style="display: block; height: 100%; text-decoration: none; color: inherit; text-align: center; min-width: 24px;">
    <span style="display: inline-block; position: relative;">
      <span style="display: inline-block; width: 20px; height: 4px; background: red;"></span>
    </span>
  </a>
</div>

</body>
</html>
